<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1>Format text <mark>marked</mark></h1>
<h2>Please use only HTML without CSS</h2>
<ul>
    <li><em>This word is <em>emphasized</em></li>
    <li><i>This word is <i>italic</i></li>
    <li><sup>This word is <sup>superscripted</sup></li>
    <li><sub>This word is <sub>subscripted</sub></li>
    <li><ins>This word is <ins>inserted</ins></li>
    <li><del>This word is <del>deleted</del></li>
</ul>

</html>
